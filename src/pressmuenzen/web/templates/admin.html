<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; margin: 2rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    th { background: #f4f4f4; }
    button { cursor: pointer; padding: 4px 10px; }
    .approve { background: #2e7d32; color: #fff; border: none; border-radius: 4px; }
    .reject { background: #c62828; color: #fff; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Moderation – offene Meldungen</h1>
  {% if not corrections %}
    <p>Die Warteschlange ist leer.</p>
  {% else %}
  <table>
    <thead>
      <tr><th>ID</th><th>Automat</th><th>Typ</th><th>Kommentar</th><th>Erstellt</th><th>Aktion</th></tr>
    </thead>
    <tbody>
      {% for c in corrections %}
      <tr>
        <td>{{ c.id }}</td>
        <td>{{ c.machine_name }} (#{{ c.machine_id }})</td>
        <td>{{ c.type }}</td>
        <td>{{ c.comment }}</td>
        <td>{{ c.created_at }}</td>
        <td>
          <form method="post" action="/admin/corrections/{{ c.id }}/approve" style="display:inline">
            <button class="approve" type="submit">Annehmen</button>
          </form>
          <form method="post" action="/admin/corrections/{{ c.id }}/reject" style="display:inline">
            <button class="reject" type="submit">Ablehnen</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% endif %}
</body>
</html>

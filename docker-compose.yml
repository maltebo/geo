# Lean single-box deployment. `db`, `bot` and `web` run continuously and are the
# only profile-less services, so `docker compose up -d` (what deploy.sh runs)
# starts exactly those three.
#
# `migrate`/`scraper` (profile "tools") are one-shots run via
# `docker compose run --rm migrate|scraper ...` (deploy.sh resp. a systemd timer);
# `run` starts a profiled service without enabling the profile, so a bare `up -d`
# never triggers them.
#
# There is no bundled reverse proxy here: a SYSTEM Caddy on the host
# (/etc/caddy/Caddyfile) owns 80/443 and reverse-proxies the geo domains to
# 127.0.0.1:8000. See plans/deployment-runbook.md.
#
# IMAGE_TAG is supplied by deploy.sh via .env.deploy (pinned to a git SHA).
# Locally it defaults to a build from the working tree.

x-app-image: &app-image
  image: ${IMAGE_REPO:-ghcr.io/maltebo/geo}:${IMAGE_TAG:-local}
  build:
    context: .
  env_file:
    - .env
  depends_on:
    db:
      condition: service_healthy
  restart: unless-stopped

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pressmuenzen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pressmuenzen}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Bound to the compose network only; never published to the host.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pressmuenzen}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  bot:
    <<: *app-image
    command: ["bot"]

  web:
    <<: *app-image
    command: ["web"]
    # Bound to loopback only: reachable by the host health gate and by the host
    # Caddy (127.0.0.1:8000), never published to the public interface.
    ports:
      - "127.0.0.1:8000:8000"

  # One-shot: `docker compose run --rm migrate` (invoked by deploy.sh before swap).
  # Profiled so a bare `up -d` never starts it (deploy.sh runs it explicitly).
  migrate:
    <<: *app-image
    command: ["migrate"]
    profiles: ["tools"]
    restart: "no"

  # One-shot: `docker compose run --rm scraper --mode incremental|full`
  # (invoked by a host systemd timer). Profiled so `up -d` never triggers a
  # scrape as a side effect of deploying.
  scraper:
    <<: *app-image
    entrypoint: ["python", "-m", "pressmuenzen", "scrape"]
    command: ["--mode", "incremental"]
    profiles: ["tools"]
    restart: "no"

volumes:
  pgdata:
